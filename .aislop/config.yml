version: 1

# Laravel app: scan application code, not vendor/build/cache or one-off audit scripts.
exclude:
  - node_modules
  - vendor
  - storage
  - bootstrap/cache
  - public/build
  - public/hot
  - .git
  - dist
  - build
  - coverage
  - "**/*.min.js"
  - database/migrations
  - scripts
  - tests
  - tests/Browser

engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true

quality:
  maxFunctionLoc: 80
  maxFileLoc: 400
  maxNesting: 5
  maxParams: 6

security:
  # npm audit already runs in .github/workflows/ci.yml
  audit: false
  auditTimeout: 25000

scoring:
  weights:
    format: 0.3
    lint: 0.6
    code-quality: 0.8
    ai-slop: 2.5
    architecture: 1.0
    security: 1.5
  thresholds:
    good: 75
    ok: 50
  smoothing: 20

ci:
  # Ratchet upward as slop is cleaned up (was 26, then 57 after trivial-comment fix, May 2026).
  failBelow: 50
  format: json

telemetry:
  enabled: false

rules:
  # Audit scripts mention mysql:// in docs only; not real secrets.
  security/hardcoded-secret: off
  ai-slop/console-leftover: warning
